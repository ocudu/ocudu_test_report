tests:
  # Section 6 - Security  Protocol & APIs Validation
  - test_id: "6.2"
    description: "SSH Server & Client"
    category: "Security"
    scope: "Entire RAN/platform/deployment/auxiliary component"
    category_description: "Security Protocol & APIs Validation"
    comment: 'O-Cloud needs to disallow algorithms with known vulnerabilities (e.g. SHA-1, MD5, 3DES, etc.)'

  - test_id: "6.3"
    description: "TLS"
    category: "Security"
    scope: "Entire RAN/platform/deployment/auxiliary component"
    category_description: "Security Protocol & APIs Validation"
    comment: 'O-Cloud needs to disallow AES_128/256_CBC. Only AEAD+PFS allowed.'

  - test_id: "6.4"
    description: "DTLS"
    category: "Security"
    scope: "CU/DU"
    category_description: "Security Protocol & APIs Validation"
    comment: 'Coming in OCUDU v26.10'

