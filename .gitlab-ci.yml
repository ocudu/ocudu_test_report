spec:
  inputs:
    ocudu_path:
      type: string
      default: ocudu/ocudu
      description: "OCUDU repository path."
    ocudu_ref:
      type: string
      default: dev
      description: "OCUDU reference branch or tag."
    suite_0:
      type: string
      default: ""
      description: "Suite 0 — NAME=URL (e.g. E2E=https://gitlab.com/org/proj/-/pipelines/123). Required."
    suite_1:
      type: string
      default: ""
      description: "Suite 1 — NAME=URL. Optional."
    suite_2:
      type: string
      default: ""
      description: "Suite 2 — NAME=URL. Optional."
    suite_3:
      type: string
      default: ""
      description: "Suite 3 — NAME=URL. Optional."
    suite_4:
      type: string
      default: ""
      description: "Suite 4 — NAME=URL. Optional."
    suite_5:
      type: string
      default: ""
      description: "Suite 5 — NAME=URL. Optional."
    suite_6:
      type: string
      default: ""
      description: "Suite 6 — NAME=URL. Optional."
    suite_7:
      type: string
      default: ""
      description: "Suite 7 — NAME=URL. Optional."
    suite_8:
      type: string
      default: ""
      description: "Suite 7 — NAME=URL. Optional."
    suite_9:
      type: string
      default: ""
      description: "Suite 9 — NAME=URL. Optional."
    report_link:
      type: string
      default: ""
      description: "GitLab URL shown as a link in the report header (e.g. branch or pipeline URL)."
    filter_status:
      type: string
      default: ""
      description: "Space-separated status values to pre-select (e.g. 'failed skipped')."
    filter_scope:
      type: string
      default: ""
      description: "Comma-separated scope values to pre-select (e.g. 'CU/DU,Entire RAN Product')."
    filter_type:
      type: string
      default: ""
      description: "Comma-separated type values to pre-select (e.g. 'Functional,Security')."
    filter_release:
      type: string
      default: ""
      description: "Comma-separated release values to pre-select (e.g. '26.04 (v1.0),26.10')."
---
include:
  - project: $[[ inputs.ocudu_path ]]
    ref: $[[ inputs.ocudu_ref ]]
    file: .gitlab/ci-shared/workflow.yml
  - project: $[[ inputs.ocudu_path ]]
    ref: $[[ inputs.ocudu_ref ]]
    file: .gitlab/ci-shared/static.yml
  - project: $[[ inputs.ocudu_path ]]
    ref: $[[ inputs.ocudu_ref ]]
    file: .gitlab/ci-shared/python.yml
  - project: $[[ inputs.ocudu_path ]]
    ref: $[[ inputs.ocudu_ref ]]
    file: .gitlab/ci-shared/gitlab_settings/.gitlab-ci.yml
    inputs:
      ocudu_path: $[[ inputs.ocudu_path ]]
      ocudu_ref: $[[ inputs.ocudu_ref ]]

stages:
  - ci
  - static
  - build

headers:
  stage: ci
  extends: .headers

yaml lint:
  stage: static
  image: python:3.12-alpine
  before_script:
    - pip install "yamllint<2"
  script:
    - yamllint -f colored -c .yamllint .
  rules:
    - if: $ON_MR
      changes:
        paths:
          - "**/*.yml"
          - "**/*.yaml"

tox:
  extends: .tox
  stage: static
  rules:
    - if: $ON_MR
      changes:
        - scripts/**/*
  variables:
    PY_DIR: scripts
  before_script:
    - apk add build-base

validate-features-yaml:
  stage: static
  image: python:3.11-slim
  rules:
    - if: $ON_MR
  script:
    - pip install --quiet pyyaml jsonschema
    - python3 scripts/validate_features.py --schema features/features.schema --data ./features/features.yaml

validate-tifg-test-plan:
  stage: static
  image: python:3.11-slim
  rules:
    - if: $ON_MR
  script:
    - pip install --quiet pyyaml jsonschema
    - python3 scripts/validate_tifg_test_plan.py --data tifg_test_plan/tifg_tests.yaml --schema tifg_test_plan/tifg_tests.schema

generate-report:
  stage: build
  image: python:3.14-slim
  rules:
    - if: $ON_WEB
    - if: $ON_API
  variables:
    SUITE_0: "$[[ inputs.suite_0 ]]"
    SUITE_1: "$[[ inputs.suite_1 ]]"
    SUITE_2: "$[[ inputs.suite_2 ]]"
    SUITE_3: "$[[ inputs.suite_3 ]]"
    SUITE_4: "$[[ inputs.suite_4 ]]"
    SUITE_5: "$[[ inputs.suite_5 ]]"
    SUITE_6: "$[[ inputs.suite_6 ]]"
    SUITE_7: "$[[ inputs.suite_7 ]]"
    SUITE_8: "$[[ inputs.suite_8 ]]"
    SUITE_9: "$[[ inputs.suite_9 ]]"
    REPORT_LINK: "$[[ inputs.report_link ]]"
    FILTER_STATUS: "$[[ inputs.filter_status ]]"
    FILTER_SCOPE: "$[[ inputs.filter_scope ]]"
    FILTER_TYPE: "$[[ inputs.filter_type ]]"
    FILTER_RELEASE: "$[[ inputs.filter_release ]]"
    OUTPUT: public
  script:
    - cd scripts
    - pip install -r requirements.txt
    - |
      SUITE_ARGS=()
      for s in "$SUITE_0" "$SUITE_1" "$SUITE_2" "$SUITE_3" "$SUITE_4" "$SUITE_5" "$SUITE_6" "$SUITE_7" "$SUITE_8" "$SUITE_9"; do
        [ -n "${s// }" ] && SUITE_ARGS+=(--suite "$s")
      done
    - |
      FILTER_ARGS=()
      [ -n "$FILTER_STATUS" ] && for s in $FILTER_STATUS; do FILTER_ARGS+=(--status "$s"); done
      if [ -n "$FILTER_SCOPE" ];   then IFS=',' read -ra _v <<< "$FILTER_SCOPE";   FILTER_ARGS+=(--scope   "${_v[@]}"); fi
      if [ -n "$FILTER_TYPE" ];    then IFS=',' read -ra _v <<< "$FILTER_TYPE";    FILTER_ARGS+=(--type    "${_v[@]}"); fi
      if [ -n "$FILTER_RELEASE" ]; then IFS=',' read -ra _v <<< "$FILTER_RELEASE"; FILTER_ARGS+=(--release "${_v[@]}"); fi
    - mkdir -p "${CI_PROJECT_DIR}/${OUTPUT}"
    - cp index.html "${CI_PROJECT_DIR}/${OUTPUT}/index.html"
    - python3 gitlab_fetch.py "${SUITE_ARGS[@]}" -o artifacts/
    - python3 xunit_report.py --dir artifacts/ --link "$REPORT_LINK" -o "${CI_PROJECT_DIR}/${OUTPUT}" "${FILTER_ARGS[@]}"
    - python3 render_report.py --data ../features/features.yaml --output ${CI_PROJECT_DIR}/${OUTPUT}/feature_list.html
  after_script:
    - |
      echo "*******************************************************************************************************************************"
      echo "Link ---> https://${CI_PROJECT_NAMESPACE_SLUG}.${CI_PAGES_DOMAIN}/-/$CI_PROJECT_NAME/-/jobs/$CI_JOB_ID/artifacts/public/index.html"
      echo "*******************************************************************************************************************************"
  artifacts:
    paths:
      - ${OUTPUT}
    when: always

pages:
  extends: generate-report
  stage: build
  environment:
    name: pages
    url: $CI_PAGES_URL
  rules:
    - if: $CI_PIPELINE_SCHEDULE_DESCRIPTION =~ /report/
  after_script:
    - |
      echo "*******************************************************************************************************************************"
      echo "Deployed to Pages: ${CI_PAGES_URL}"
      echo "*******************************************************************************************************************************"

build-tifg-report:
  stage: build
  image: python:3.11-slim
  rules:
    - if: $ON_MR
    - if: $ON_WEB
    - if: $ON_API
  script:
    - pip install --quiet pyyaml
    - python3 scripts/tifg_report.py --data tifg_test_plan/tifg_tests.yaml --output tifg_report.html
  artifacts:
    paths:
      - tifg_report.html
    expose_as: "TIFG Test Plan"

build-feature-list:
  stage: build
  image: python:3.11-slim
  rules:
    - if: $ON_MR
    - if: $ON_WEB
    - if: $ON_API
  script:
    - pip install --quiet pyyaml
    - python3 scripts/render_report.py --data features/features.yaml --output feature_list.html
  artifacts:
    paths:
      - feature_list.html
    expose_as: "Feature List"
