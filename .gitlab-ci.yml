spec:
  inputs:
    ocudu_path:
      type: string
      default: ocudu/ocudu
      description: "OCUDU repository path."
    ocudu_ref:
      type: string
      default: dev
      description: "OCUDU reference branch or tag."
    suite_1:
      type: string
      default: ""
      description: "Suite 1 — NAME=URL (e.g. E2E=https://gitlab.com/org/proj/-/pipelines/123). Required."
    suite_2:
      type: string
      default: ""
      description: "Suite 2 — NAME=URL. Optional."
    suite_3:
      type: string
      default: ""
      description: "Suite 3 — NAME=URL. Optional."
    suite_4:
      type: string
      default: ""
      description: "Suite 4 — NAME=URL. Optional."
    suite_5:
      type: string
      default: ""
      description: "Suite 5 — NAME=URL. Optional."
    suite_6:
      type: string
      default: ""
      description: "Suite 6 — NAME=URL. Optional."
    suite_7:
      type: string
      default: ""
      description: "Suite 7 — NAME=URL. Optional."
    suite_8:
      type: string
      default: ""
      description: "Suite 7 — NAME=URL. Optional."
    report_link:
      type: string
      default: ""
      description: "GitLab URL shown as a link in the report header (e.g. branch or pipeline URL)."
    release:
      type: string
      default: ""
      description: "Show all features with this release value (e.g. '26.04 (v1.0)') plus an 'others' group. If not specified, uses suites layout."
---
include:
  - project: $[[ inputs.ocudu_path ]]
    ref: $[[ inputs.ocudu_ref ]]
    file: .gitlab/ci-shared/workflow.yml
  - project: $[[ inputs.ocudu_path ]]
    ref: $[[ inputs.ocudu_ref ]]
    file: .gitlab/ci-shared/static.yml
  - project: $[[ inputs.ocudu_path ]]
    ref: $[[ inputs.ocudu_ref ]]
    file: .gitlab/ci-shared/python.yml
  - project: $[[ inputs.ocudu_path ]]
    ref: $[[ inputs.ocudu_ref ]]
    file: .gitlab/ci-shared/gitlab_settings/.gitlab-ci.yml
    inputs:
      ocudu_path: $[[ inputs.ocudu_path ]]
      ocudu_ref: $[[ inputs.ocudu_ref ]]

stages:
  - ci
  - static
  - build

headers:
  stage: ci
  extends: .headers

yaml lint:
  stage: static
  image: python:3.12-alpine
  before_script:
    - pip install "yamllint<2"
  script:
    - yamllint -f colored -c .yamllint .
  rules:
    - if: $ON_MR
      changes:
        paths:
          - "**/*.yml"
          - "**/*.yaml"

tox:
  extends: .tox
  stage: static
  rules:
    - if: $ON_MR
      changes:
        - scripts/**/*
  variables:
    PY_DIR: scripts
  before_script:
    - apk add build-base

validate-features-yaml:
  stage: static
  image: python:3.11-slim
  rules:
    - if: $ON_MR
  script:
    - pip install --quiet pyyaml jsonschema
    - python3 scripts/validate_features.py --schema features/features.schema --data ./features/features.yaml

generate-report:
  stage: build
  image: python:3.14-slim
  rules:
    - if: $ON_WEB
    - if: $ON_API
    - if: $CI_PIPELINE_SCHEDULE_DESCRIPTION =~ /report/
  variables:
    SUITE_1: "$[[ inputs.suite_1 ]]"
    SUITE_2: "$[[ inputs.suite_2 ]]"
    SUITE_3: "$[[ inputs.suite_3 ]]"
    SUITE_4: "$[[ inputs.suite_4 ]]"
    SUITE_5: "$[[ inputs.suite_5 ]]"
    SUITE_6: "$[[ inputs.suite_6 ]]"
    SUITE_7: "$[[ inputs.suite_7 ]]"
    SUITE_8: "$[[ inputs.suite_8 ]]"
    REPORT_LINK: "$[[ inputs.report_link ]]"
    RELEASE: "$[[ inputs.release ]]"
  script:
    - cd scripts
    - pip install -r requirements.txt
    - |
      SUITE_ARGS=()
      for s in "$SUITE_1" "$SUITE_2" "$SUITE_3" "$SUITE_4" "$SUITE_5" "$SUITE_6" "$SUITE_7" "$SUITE_8"; do
        [ -n "${s// }" ] && SUITE_ARGS+=(--suite "$s")
      done
    - python3 gitlab_fetch.py "${SUITE_ARGS[@]}" -o artifacts/
    - if [ -n "$RELEASE" ]; then RELEASE_ARGS=(--release "$RELEASE"); else RELEASE_ARGS=(); fi
    - python3 xunit_report.py --dir artifacts/ --link "$REPORT_LINK" "${RELEASE_ARGS[@]}" -o report.html
    # Report link
    - |
      echo "*******************************************************************************************************************************"
      echo "Link ---> https://${CI_PROJECT_NAMESPACE_SLUG}.${CI_PAGES_DOMAIN}/-/$CI_PROJECT_NAME/-/jobs/$CI_JOB_ID/artifacts/scripts/report.html"
      echo "*******************************************************************************************************************************"
  artifacts:
    paths:
      - scripts/report.html
    expose_as: "Test Report"
    when: always

build-feature-list:
  stage: build
  image: python:3.11-slim
  rules:
    - if: $ON_MR
    - if: $ON_WEB
    - if: $ON_API
  script:
    - pip install --quiet pyyaml
    - python3 scripts/render_report.py --data features/features.yaml --output feature_list.html
  artifacts:
    paths:
      - feature_list.html
    expose_as: "Feature List"
