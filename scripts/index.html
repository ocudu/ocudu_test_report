<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Test Reports</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      gap: 6px;
      padding: 10px 16px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      flex-shrink: 0;
      align-items: center;
    }

    .tab {
      padding: 7px 22px;
      border-radius: 20px;
      font-size: .85em;
      font-weight: 600;
      text-decoration: none;
      color: #94a3b8;
      background: #0f172a;
      border: 1px solid #334155;
      transition: color .12s, border-color .12s, background .12s;
      cursor: pointer;
    }

    .tab:hover {
      color: #e2e8f0;
      border-color: #94a3b8;
    }

    .tab.active {
      color: #38bdf8;
      border-color: #38bdf8;
      background: rgba(56, 189, 248, .08);
    }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
    }
  </style>
</head>

<body>
  <nav>
    <a class="tab" href="#report" data-key="report">Test Report</a>
    <a class="tab" href="#all" data-key="all">All Tests</a>
    <a class="tab" href="#features" data-key="features">Features</a>
  </nav>
  <iframe id="frame"></iframe>
  <script>
    (function () {
      var PAGES = { report: 'report.html', all: 'all.html', features: 'feature_list.html' };
      var DEFAULT = 'report';
      var frame = document.getElementById('frame');
      var tabs = document.querySelectorAll('.tab');

      function activate(key) {
        var k = PAGES[key] ? key : DEFAULT;
        frame.src = PAGES[k];
        tabs.forEach(function (t) { t.classList.toggle('active', t.dataset.key === k); });
      }

      tabs.forEach(function (tab) {
        tab.addEventListener('click', function (e) {
          e.preventDefault();
          var key = tab.dataset.key;
          if (location.hash.slice(1) !== key) location.hash = key;
          else activate(key);
        });
      });

      window.addEventListener('hashchange', function () { activate(location.hash.slice(1)); });

      activate(location.hash.slice(1) || DEFAULT);
    }());
  </script>
</body>

</html>
